<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Brohn Smith · Line Sheet Builder</title>
<style>
/* ─────────────────────────────────────────────────────────
   RESET
───────────────────────────────────────────────────────── */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;overflow:hidden}
body{
  font-family:'Helvetica Neue',Helvetica,Arial,sans-serif;
  background:#fff;color:#000;font-size:13px;line-height:1.45;
  -webkit-font-smoothing:antialiased;
}
input,textarea,select,button{
  font-family:'Helvetica Neue',Helvetica,Arial,sans-serif;
  font-size:inherit;color:inherit;line-height:inherit;
}
button{cursor:pointer}
input[type=number]::-webkit-inner-spin-button,
input[type=number]::-webkit-outer-spin-button{-webkit-appearance:none}
input[type=number]{-moz-appearance:textfield}
input[type=date]{appearance:none}

/* ─────────────────────────────────────────────────────────
   TOKENS
───────────────────────────────────────────────────────── */
:root{
  --rule:0.5px solid #000;
  --rule-lt:0.5px solid #ddd;
  --rule-xl:0.5px solid #eee;
}

/* ─────────────────────────────────────────────────────────
   TOP BAR
───────────────────────────────────────────────────────── */
#topbar{
  position:fixed;top:0;left:0;right:0;height:44px;
  background:#fff;border-bottom:var(--rule);
  display:flex;align-items:center;padding:0 32px;
  justify-content:space-between;z-index:200;
}
.topbar-brand{
  font-size:9px;font-weight:700;letter-spacing:0.22em;text-transform:uppercase;
}
.topbar-actions{display:flex;gap:10px;align-items:center}

/* ─────────────────────────────────────────────────────────
   BUTTONS
───────────────────────────────────────────────────────── */
.btn{
  background:#000;color:#fff;border:none;
  padding:8px 18px;font-size:9px;font-weight:600;
  letter-spacing:0.16em;text-transform:uppercase;
}
.btn:hover{background:#333}
.btn-sm{padding:5px 13px;font-size:8px}
.btn-ghost{
  background:none;color:#000;border:var(--rule);
  padding:7px 17px;font-size:9px;font-weight:400;
  letter-spacing:0.12em;text-transform:uppercase;
}
.btn-ghost:hover{background:#f8f8f8}
.btn-ghost-sm{padding:4px 10px;font-size:8px}
.btn-text{
  background:none;border:none;color:#aaa;
  font-size:8px;letter-spacing:0.1em;text-transform:uppercase;
  padding:2px 0;
}
.btn-text:hover{color:#000}

/* ─────────────────────────────────────────────────────────
   MAIN WRAPPER
───────────────────────────────────────────────────────── */
#app{margin-top:44px;height:calc(100vh - 44px)}
#view{height:100%}

/* ─────────────────────────────────────────────────────────
   DASHBOARD
───────────────────────────────────────────────────────── */
#dashboard{
  max-width:780px;margin:0 auto;padding:56px 32px;
  height:100%;overflow-y:auto;
}
.dash-head{
  display:flex;justify-content:space-between;align-items:baseline;
  margin-bottom:40px;
}
.dash-head h1{
  font-size:9px;font-weight:400;letter-spacing:0.2em;
  text-transform:uppercase;color:#888;
}
.ls-table{width:100%;border-collapse:collapse}
.ls-table thead th{
  font-size:8px;font-weight:400;letter-spacing:0.14em;
  text-transform:uppercase;color:#888;
  text-align:left;padding:0 0 10px;border-bottom:var(--rule);
}
.ls-table thead th.r{text-align:right}
.ls-table tbody tr{border-bottom:var(--rule-lt)}
.ls-table tbody tr:hover{background:#fafafa}
.ls-table tbody td{padding:13px 0;font-size:12px;vertical-align:middle}
.ls-table .muted{color:#aaa;font-size:11px}
.ls-table .act{text-align:right}
.act-btns{display:flex;gap:6px;justify-content:flex-end}
.empty-dash{
  padding:80px 0;text-align:center;
  font-size:9px;color:#ccc;letter-spacing:0.14em;text-transform:uppercase;
}

/* ─────────────────────────────────────────────────────────
   EDITOR LAYOUT
───────────────────────────────────────────────────────── */
#editor-wrap{display:grid;grid-template-columns:430px 1fr;height:100%}
#editor-pane{
  overflow-y:auto;border-right:var(--rule);
  padding:28px 24px;
}
#preview-pane{
  overflow-y:auto;background:#e8e8e8;
  padding:36px 28px;
  display:flex;flex-direction:column;align-items:center;gap:16px;
}

/* ── Mobile: stack editor above preview ── */
@media(max-width:799px){
  #editor-wrap{
    grid-template-columns:1fr;
    grid-template-rows:auto 1fr;
    height:auto;
    min-height:calc(100vh - 44px);
  }
  #editor-pane{
    border-right:none;border-bottom:var(--rule);
  }
  #preview-pane{
    padding:20px 8px;
    align-items:stretch;
    overflow-x:auto;
  }
  .doc-page{
    transform-origin:top center;
    transform:scale(0.48);
    margin-bottom:calc((842px * 0.48 - 842px));
  }
}

/* ─────────────────────────────────────────────────────────
   EDITOR FIELDS
───────────────────────────────────────────────────────── */
.e-section{
  margin-bottom:28px;padding-bottom:28px;
  border-bottom:var(--rule-lt);
}
.e-section:last-child{border-bottom:none}
.e-section-title{
  display:block;font-size:8px;font-weight:400;
  letter-spacing:0.2em;text-transform:uppercase;color:#888;
  margin-bottom:16px;
}
.f-row{margin-bottom:12px}
.f-row label{
  display:block;font-size:8px;font-weight:400;
  letter-spacing:0.1em;text-transform:uppercase;color:#bbb;
  margin-bottom:3px;
}
.fi{
  display:block;width:100%;border:none;
  border-bottom:var(--rule-lt);
  padding:5px 0;font-size:12px;
  background:transparent;outline:none;
}
.fi:focus{border-bottom-color:#000}
textarea.fi{resize:vertical;min-height:52px}
.f-row-2{display:grid;grid-template-columns:1fr 1fr;gap:14px}

/* ─────────────────────────────────────────────────────────
   PRODUCT CARD IN EDITOR
───────────────────────────────────────────────────────── */
.prod-card{border:var(--rule-lt);padding:16px;margin-bottom:14px}
.prod-card-head{
  display:flex;justify-content:space-between;align-items:center;
  margin-bottom:14px;
}
.prod-card-title{
  font-size:8px;font-weight:600;letter-spacing:0.18em;text-transform:uppercase;
}
.btn-move{
  background:none;border:0.5px solid #ddd;color:#aaa;
  width:22px;height:22px;display:inline-flex;align-items:center;justify-content:center;
  font-size:11px;line-height:1;cursor:pointer;
}
.btn-move:hover{border-color:#888;color:#000}
.btn-move:disabled{opacity:0.2;pointer-events:none}
.move-btns{display:flex;gap:4px}
.ed-img-row{display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-bottom:12px}
.ed-slot{
  aspect-ratio:4/3;border:var(--rule-lt);
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  gap:3px;cursor:pointer;position:relative;overflow:hidden;background:#fff;
}
.ed-slot:hover{border-color:#888}
.ed-slot.has-img .slot-ui{display:none}
.slot-ui{
  display:flex;flex-direction:column;align-items:center;gap:3px;
  pointer-events:none;
}
.slot-plus{font-size:14px;font-weight:200;color:#ccc;line-height:1}
.slot-lbl{font-size:7px;letter-spacing:0.14em;text-transform:uppercase;color:#ccc}
.ed-slot img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover}

/* Metal block */
.metal-block{
  margin-top:14px;padding-top:12px;border-top:var(--rule-lt);
}
.metal-block-head{
  display:flex;justify-content:space-between;align-items:center;
  margin-bottom:8px;
}
.metal-name-input{
  border:none;border-bottom:var(--rule-lt);
  font-size:11px;font-weight:600;letter-spacing:0.06em;
  background:transparent;outline:none;padding:3px 0;width:180px;
}
.metal-name-input:focus{border-bottom-color:#000}
.px-tbl{width:100%;border-collapse:collapse;font-size:11px}
.px-tbl thead th{
  font-size:7px;font-weight:400;letter-spacing:0.12em;
  text-transform:uppercase;color:#bbb;
  text-align:left;padding:0 0 5px;
}
.px-tbl thead th.r{text-align:right}
.px-tbl tbody td{padding:3px 0}
.px-in{
  width:100%;border:none;border-bottom:var(--rule-xl);
  font-size:11px;padding:3px 0;background:transparent;outline:none;
}
.px-in:focus{border-bottom-color:#000}
.px-in.r{text-align:right}
.px-tbl tfoot td{
  border-top:var(--rule);padding-top:7px;
  font-size:11px;font-weight:600;
}
.px-tbl tfoot td.r{text-align:right;font-variant-numeric:tabular-nums}
.btn-del-row{
  background:none;border:none;color:#ccc;
  font-size:14px;line-height:1;padding:0 2px;cursor:pointer;
}
.btn-del-row:hover{color:#000}
.btn-add-row{
  background:none;color:#bbb;border:0.5px dashed #ddd;
  padding:4px 0;width:100%;margin-top:4px;
  font-size:7px;letter-spacing:0.14em;text-transform:uppercase;cursor:pointer;
}
.btn-add-row:hover{border-color:#888;color:#555}
.btn-add-metal{
  background:none;color:#bbb;border:0.5px dashed #ddd;
  padding:6px 0;width:100%;margin-top:8px;
  font-size:7px;letter-spacing:0.14em;text-transform:uppercase;
}
.btn-add-metal:hover{border-color:#888;color:#555}
.btn-add-prod{
  background:none;color:#bbb;border:0.5px dashed #ddd;
  padding:10px 0;width:100%;
  font-size:7px;letter-spacing:0.14em;text-transform:uppercase;
}
.btn-add-prod:hover{border-color:#888;color:#555}

/* ─────────────────────────────────────────────────────────
   DOCUMENT PAGES  (preview + print)
───────────────────────────────────────────────────────── */
.doc-page{
  width:595px;min-height:842px;
  background:#fff;
  padding:52px 52px 80px;
  position:relative;
  font-family:'Helvetica Neue',Helvetica,Arial,sans-serif;
  color:#000;
  overflow:hidden;
}

/* — Cover — */
.cov-top{
  display:flex;justify-content:space-between;align-items:flex-start;
  margin-bottom:0;
}
.cov-brand{display:flex;flex-direction:column;gap:4px}
.cov-brand-name{
  font-size:11px;font-weight:600;letter-spacing:0.22em;text-transform:uppercase;
}
.cov-brand-site{
  font-size:8px;color:#aaa;letter-spacing:0.12em;
}
.cov-logo{
  width:90px;height:44px;flex-shrink:0;
  border:var(--rule-lt);
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  gap:3px;cursor:pointer;overflow:hidden;
}
.cov-logo.has-img .slot-ui{display:none}
.cov-logo.has-img{
  border:none;background:transparent;
  width:90px;height:44px;
}
.cov-logo img{
  max-width:100%;max-height:100%;
  object-fit:contain;
  display:block;
  filter:invert(1);
}
.cov-rule{border:none;border-top:var(--rule);margin-top:24px}
.cov-body{
  display:flex;flex-direction:column;align-items:center;
  text-align:center;padding:72px 0 64px;
  border-bottom:var(--rule-lt);
}
.cov-buyer{
  font-size:22px;font-weight:300;letter-spacing:0.02em;margin-bottom:12px;
}
.cov-meta{
  font-size:9px;color:#888;letter-spacing:0.12em;text-transform:uppercase;
  line-height:1.8;
}
.cov-collection{
  font-size:12px;font-weight:400;letter-spacing:0.2em;
  text-transform:uppercase;margin-top:28px;
}
.cov-footer{
  position:absolute;bottom:40px;left:52px;right:52px;
  padding-top:12px;border-top:var(--rule-lt);
  display:flex;justify-content:space-between;align-items:center;
}
.cov-footer span{
  font-size:7.5px;color:#aaa;letter-spacing:0.1em;text-transform:uppercase;
}

/* — Product page — */
.pp-head{
  display:flex;justify-content:space-between;align-items:center;
  padding-bottom:12px;border-bottom:var(--rule);margin-bottom:20px;
}
.pp-head-left{display:flex;flex-direction:column;gap:4px}
.pp-name{font-size:14px;font-weight:400;letter-spacing:0.02em}
.pp-sku{font-size:8px;color:#888;letter-spacing:0.14em;text-transform:uppercase}
.pp-sizes{font-size:8px;color:#888;letter-spacing:0.06em;margin-top:2px}
.pp-images{
  display:grid;grid-template-columns:1fr 1fr;
  gap:1px;background:#ccc;margin-bottom:16px;
}
.pp-img-slot{
  aspect-ratio:4/3;background:#fff;
  position:relative;overflow:hidden;
  display:flex;align-items:center;justify-content:center;
  cursor:pointer;
}
.pp-img-slot.has-img .slot-ui{display:none}
.pp-img-slot.secondary:not(.has-img) .slot-ui{visibility:hidden}
.pp-img-slot img{
  position:absolute;inset:0;width:100%;height:100%;object-fit:cover;
}
.pp-meta{
  font-size:9.5px;color:#666;letter-spacing:0.05em;
  margin-bottom:16px;padding-bottom:12px;border-bottom:var(--rule-lt);
}
.doc-px{width:100%;border-collapse:collapse}
.doc-px thead tr{border-bottom:var(--rule)}
.doc-px thead th{
  font-size:7.5px;font-weight:400;letter-spacing:0.14em;
  text-transform:uppercase;color:#888;
  text-align:left;padding:0 0 9px;
}
.doc-px thead th.r{text-align:right;padding-left:22px}
.doc-px .grp-hdr td{
  font-size:7.5px;font-weight:600;letter-spacing:0.16em;
  text-transform:uppercase;color:#444;
  padding:14px 0 5px;border-bottom:none;
}
.doc-px tbody tr{border-bottom:var(--rule-xl)}
.doc-px tbody td{
  font-size:11px;padding:8px 0;
}
.doc-px tbody td.r{
  text-align:right;padding-left:22px;
  font-variant-numeric:tabular-nums;
}
.doc-px .sub-row td{
  border-top:var(--rule);border-bottom:none;
  font-size:11.5px;font-weight:600;padding:9px 0 6px;
}
.doc-px .sub-row td.r{
  text-align:right;padding-left:22px;
  font-variant-numeric:tabular-nums;
}
.pp-footer{
  position:absolute;bottom:40px;left:52px;right:52px;
  padding-top:11px;border-top:var(--rule-lt);
  display:flex;justify-content:space-between;align-items:center;
}
.pp-footer .terms{font-size:7.5px;color:#aaa;max-width:360px;line-height:1.5}
.pp-footer .pgn{font-size:8px;color:#aaa;letter-spacing:0.08em}

/* drag-over indicator */
.drag-over{outline:1px solid #000 !important}

/* — Section divider page — */
.sec-div{display:flex;flex-direction:column}
.sec-div-body{
  flex:1;display:flex;flex-direction:column;
  justify-content:center;padding-bottom:40px;
}
.sec-div-name{
  font-size:52px;font-weight:200;
  letter-spacing:0.28em;text-transform:uppercase;
  color:#000;line-height:1;
}

/* — Page numbers — */
.pgn{font-size:7.5px;color:#aaa;letter-spacing:0.1em;font-variant-numeric:tabular-nums}

/* ─────────────────────────────────────────────────────────
   PRINT
───────────────────────────────────────────────────────── */
@media print{
  html,body{height:auto!important;overflow:visible!important}
  #topbar,#editor-pane{display:none!important}
  #app{margin-top:0!important;height:auto!important;overflow:visible!important}
  #editor-wrap{display:block!important;height:auto!important;overflow:visible!important}
  #preview-pane{
    display:block!important;
    background:#fff!important;padding:0!important;
    overflow:visible!important;height:auto!important;
  }
  #doc-preview{display:block!important;overflow:visible!important}
  .doc-page{
    width:210mm!important;min-height:297mm!important;
    padding:20mm 20mm 28mm!important;
    page-break-after:always;overflow:visible!important;
    position:relative!important;
    transform:none!important;
  }
  .slot-ui,.btn-add-metal,.btn-add-prod,.btn-del-row,.btn-add-row{display:none!important}
  @page{margin:0;size:A4}
}
</style>
</head>
<body>

<div id="topbar">
  <span class="topbar-brand">Brohn Smith · Line Sheet Builder</span>
  <div class="topbar-actions" id="topbar-actions"></div>
</div>

<div id="app">
  <div id="view"></div>
</div>

<!-- Hidden global file input -->
<input type="file" id="g-file-input" accept="image/*" style="display:none">

<script>
'use strict';

/* ─────────────────────────────────────────────────────────
   UTILITIES
───────────────────────────────────────────────────────── */
function uid(){
  return Date.now().toString(36)+Math.random().toString(36).slice(2,7);
}
function esc(s){
  return String(s??'')
    .replace(/&/g,'&amp;').replace(/</g,'&lt;')
    .replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
function fmtMoney(n,cur){
  return new Intl.NumberFormat('en-US',{
    style:'currency',currency:cur||'AUD',
    minimumFractionDigits:2,maximumFractionDigits:2
  }).format(n||0);
}
function deepClone(o){return JSON.parse(JSON.stringify(o))}
function el(id){return document.getElementById(id)}

/* ─────────────────────────────────────────────────────────
   DATA FACTORIES
───────────────────────────────────────────────────────── */
function mkRow(desc){
  return{id:uid(),description:desc||'',wholesale:0,rrp:0};
}
function mkVariant(name){
  return{
    id:uid(),
    metalName:name||'Metal Variant',
    lineDescription:'',
    rows:[],
    subtotalWholesale:0,subtotalRRP:0
  };
}
function mkProduct(){
  return{
    id:uid(),pieceName:'',sku:'',metadata:'',
    images:[null,null],
    metalVariants:[mkVariant('18ct Yellow Gold')]
  };
}
function mkLineSheet(){
  return{
    id:uid(),
    buyerName:'',
    date:new Date().toISOString().slice(0,10),
    currency:'AUD',
    collection:'',
    footerTerms:'All prices are valid for 30 days. Prices are ex-factory and do not include freight or duties.',
    logoImage:null,
    products:[mkProduct()]
  };
}

function recomputeSubtotals(ls){
  for(const p of ls.products){
    for(const mv of p.metalVariants){
      mv.subtotalWholesale=mv.rows.reduce((s,r)=>s+(parseFloat(r.wholesale)||0),0);
      mv.subtotalRRP=mv.rows.reduce((s,r)=>s+(parseFloat(r.rrp)||0),0);
    }
  }
}

/* ─────────────────────────────────────────────────────────
   STATE
───────────────────────────────────────────────────────── */
const ST={
  lineSheets:[],
  activeId:null,
  view:'dashboard',  // 'dashboard' | 'editor'
};

/* ─────────────────────────────────────────────────────────
   INDEXEDDB IMAGE STORE  (images too large for localStorage)
───────────────────────────────────────────────────────── */
let _idb=null;
let _imgsDirty=false;

function openImgDB(){
  if(_idb)return Promise.resolve(_idb);
  return new Promise((resolve,reject)=>{
    const req=indexedDB.open('bs-img-db',1);
    req.onupgradeneeded=ev=>{ev.target.result.createObjectStore('images');};
    req.onsuccess=ev=>{_idb=ev.target.result;resolve(_idb);};
    req.onerror=()=>reject(req.error);
  });
}

async function idbGetAll(){
  try{
    const db=await openImgDB();
    return new Promise(resolve=>{
      const tx=db.transaction('images','readonly');
      const store=tx.objectStore('images');
      const result={};
      const cur=store.openCursor();
      cur.onsuccess=ev=>{
        const c=ev.target.result;
        if(!c){resolve(result);return;}
        result[c.key]=c.value;c.continue();
      };
      cur.onerror=()=>resolve(result);
    });
  }catch(e){return {};}
}

async function saveImagesToIDB(){
  if(!_imgsDirty)return;
  _imgsDirty=false;
  try{
    const db=await openImgDB();
    const tx=db.transaction('images','readwrite');
    const store=tx.objectStore('images');
    for(const ls of ST.lineSheets){
      /* Product images keyed by product ID only — survives sheet rebuilds */
      for(const p of ls.products){
        for(let ii=0;ii<2;ii++){
          const key=`img:${p.id}:${ii}`;
          if(p.images&&p.images[ii])store.put(p.images[ii],key);
          else store.delete(key);
        }
      }
    }
    await new Promise((resolve,reject)=>{tx.oncomplete=resolve;tx.onerror=()=>reject(tx.error);});
  }catch(e){console.warn('IDB save error',e);}
}

async function loadAllImages(){
  try{
    const all=await idbGetAll();
    for(const ls of ST.lineSheets){
      /* Product images — logos now handled by localStorage/loadLogos() */
      for(const p of ls.products){
        if(!p.images)p.images=[null,null];
        for(let ii=0;ii<2;ii++){
          const img=all[`img:${p.id}:${ii}`]
            /* fallback: old key format (sheetId:productId:slot) */
            ||all[`${ls.id}:${p.id}:${ii}`];
          if(img)p.images[ii]=img;
        }
      }
    }
  }catch(e){console.warn('IDB load error',e);}
}

/* ── Logo store: one global logo applied to all sheets ── */
function saveLogos(){
  try{
    /* Find any logo from any sheet and save as global default */
    const anyLogo=ST.lineSheets.map(ls=>ls.logoImage).find(Boolean);
    if(anyLogo)localStorage.setItem('bs_ls_logo',anyLogo);
  }catch(e){console.warn('logo save error',e);}
}
function loadLogos(){
  const logo=localStorage.getItem('bs_ls_logo')||HARDCODED_LOGO;
  for(const ls of ST.lineSheets){ls.logoImage=logo;}
}

function loadST(){
  try{
    const raw=localStorage.getItem('bs_ls_v1');
    if(raw){const d=JSON.parse(raw);ST.lineSheets=d.lineSheets||[];loadLogos();return;}
  }catch(e){}
  /* Fallback: try to restore from rolling backup */
  try{
    const bk=localStorage.getItem('bs_ls_backup');
    if(bk){const d=JSON.parse(bk);ST.lineSheets=d.lineSheets||[];loadLogos();console.warn('Restored from backup');}
  }catch(e){}
}

function saveST(){
  /* Strip product images before saving to localStorage — those live in IndexedDB */
  const stripped={lineSheets:ST.lineSheets.map(ls=>({
    ...ls,
    logoImage:null,
    products:ls.products.map(p=>({...p,images:[null,null]}))
  }))};
  try{
    const payload=JSON.stringify(stripped);
    localStorage.setItem('bs_ls_v1',payload);
    localStorage.setItem('bs_ls_backup',payload);
  }catch(e){console.warn('localStorage save error',e);}
  /* Logos saved separately in localStorage (sync, reliable) */
  saveLogos();
  /* Product images saved to IndexedDB asynchronously */
  saveImagesToIDB();
}

function _loadScript(url){
  return new Promise((res,rej)=>{
    if(document.querySelector(`script[src="${url}"]`)){res();return;}
    const s=document.createElement('script');
    s.src=url;s.onload=res;s.onerror=rej;
    document.head.appendChild(s);
  });
}

async function downloadAllZip(btn){
  const orig=btn.textContent;
  btn.disabled=true;btn.textContent='Loading…';
  try{
    await Promise.all([
      _loadScript('https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js'),
      _loadScript('https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js'),
      _loadScript('https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js'),
    ]);

    const zip=new JSZip();

    /* Off-screen render container — must be visible to html2canvas */
    const wrap=document.createElement('div');
    wrap.style.cssText='position:fixed;left:-9999px;top:0;width:595px;background:#fff;z-index:-1';
    document.body.appendChild(wrap);

    for(let i=0;i<ST.lineSheets.length;i++){
      const ls=ST.lineSheets[i];
      btn.textContent=`Building ${i+1}/${ST.lineSheets.length}…`;

      wrap.innerHTML=docHTML(ls);

      const {jsPDF}=window.jspdf;
      const pdf=new jsPDF({orientation:'portrait',unit:'mm',format:'a4'});
      const docPages=wrap.querySelectorAll('.doc-page');

      for(let pi=0;pi<docPages.length;pi++){
        const pg=docPages[pi];
        /* Force exact A4 pixel size for capture */
        pg.style.width='595px';
        pg.style.minHeight='842px';
        pg.style.height='842px';
        pg.style.overflow='visible';
        const canvas=await html2canvas(pg,{
          scale:2,
          useCORS:true,
          allowTaint:true,
          backgroundColor:'#ffffff',
          width:595,
          height:842,
          windowWidth:595,
        });
        if(pi>0)pdf.addPage();
        const img=canvas.toDataURL('image/jpeg',0.93);
        pdf.addImage(img,'JPEG',0,0,210,297);
      }

      const title=[ls.collection,ls.buyerName].filter(Boolean).join(' - ')||ls.id;
      const safe=title.replace(/[^a-z0-9 \-_]/gi,'_').trim();
      zip.file(safe+'.pdf',pdf.output('blob'));
    }

    document.body.removeChild(wrap);

    btn.textContent='Zipping…';
    const blob=await zip.generateAsync({type:'blob'});
    const url=URL.createObjectURL(blob);
    const a=document.createElement('a');
    a.href=url;a.download='brohn-linesheets-'+new Date().toISOString().slice(0,10)+'.zip';
    a.click();
    setTimeout(()=>URL.revokeObjectURL(url),5000);

  }catch(e){
    alert('Export failed: '+e.message);
    console.error(e);
  }finally{
    btn.disabled=false;btn.textContent=orig;
  }
}

function downloadAllCSV(){
  const TO_USD={AUD:0.72,USD:1,GBP:1.27,EUR:1.08};
  const toUSD=(n,cur)=>n*(TO_USD[cur]||1);
  const q=c=>`"${String(c==null?'':c).replace(/"/g,'""')}"`;

  const rows=[['Sheet','Currency','Wholesale','RRP','Wholesale USD']];
  let grandWS_USD=0;

  for(const ls of ST.lineSheets){
    const cur=ls.currency||'AUD';
    const label=[ls.buyerName,ls.collection].filter(Boolean).join(' · ')||'Untitled';
    let sheetWS=0,sheetRRP=0;
    for(const p of ls.products)
      for(const mv of p.metalVariants){
        sheetWS+=mv.subtotalWholesale||0;
        sheetRRP+=mv.subtotalRRP||0;
      }
    const sheetUSD=toUSD(sheetWS,cur);
    grandWS_USD+=sheetUSD;
    rows.push([label, cur, sheetWS.toFixed(2), sheetRRP.toFixed(2), sheetUSD.toFixed(2)]);
  }

  rows.push(['','','','','']);
  rows.push(['GRAND TOTAL (wholesale USD)','','','',grandWS_USD.toFixed(2)]);
  rows.push(['','','','']);
  rows.push([`FX: AUD ${TO_USD.AUD} · GBP ${TO_USD.GBP} · EUR ${TO_USD.EUR}`,'','','']);

  const csv=rows.map(r=>r.map(q).join(',')).join('\n');
  const blob=new Blob([csv],{type:'text/csv'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');
  a.href=url;
  a.download='brohn-linesheets-'+new Date().toISOString().slice(0,10)+'.csv';
  a.click();
  URL.revokeObjectURL(url);
}

function downloadBackup(){
  /* Export includes images currently loaded in ST */
  const data=JSON.stringify({lineSheets:ST.lineSheets});
  const blob=new Blob([data],{type:'application/json'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');
  a.href=url;
  a.download='brohn-linesheet-backup-'+new Date().toISOString().slice(0,10)+'.json';
  a.click();
  URL.revokeObjectURL(url);
}

function restoreBackup(file){
  const reader=new FileReader();
  reader.onload=ev=>{
    try{
      const d=JSON.parse(ev.target.result);
      if(!Array.isArray(d.lineSheets))throw new Error('Invalid backup file');
      ST.lineSheets=d.lineSheets;
      _imgsDirty=true;
      saveImagesToIDB().then(()=>{
        saveST();
        render();
        alert('Restored '+d.lineSheets.length+' line sheet(s).');
      });
    }catch(e){alert('Restore failed: '+e.message);}
  };
  reader.readAsText(file);
}
function activeLS(){return ST.lineSheets.find(ls=>ls.id===ST.activeId)}

/* path helpers */
function getPath(obj,path){
  return path.split('.').reduce((o,k)=>o!=null?o[isNaN(k)?k:+k]:undefined,obj);
}
function setPath(obj,path,val){
  const keys=path.split('.');
  const last=keys.pop();
  let t=obj;
  for(const k of keys){t=t[isNaN(k)?k:+k];if(t==null)return;}
  t[isNaN(last)?last:+last]=val;
}

function docHTML(ls){
  const cur=ls.currency||'AUD';

  /* — Cover page — */

      <div class="cov-brand-site">brohnsmith.com</div>

    <span>brohnsmith.com</span>
  </div>
</div>`;

  /* — Pre-calculate total pages for numbering — */

  let _grp=null,totalPages=1;
  for(const p of ls.products){
    if(p.group&&p.group!=='OTHER'&&p.group!==_grp){totalPages++;_grp=p.group;}

        <td class="r">${mv.subtotalRRP?fmtMoney(mv.subtotalRRP,cur):'—'}</td>

/* ─────────────────────────────────────────────────────────
   IMAGE SLOT BINDING
───────────────────────────────────────────────────────── */
let _pendingSlot=null;

function bindSlots(){
  document.querySelectorAll('[data-imgslot]').forEach(slot=>{
    slot.onclick=null;
    slot.ondragover=null;
    slot.ondragleave=null;
    slot.ondrop=null;
    slot.onclick=e=>{
      e.stopPropagation();
      _pendingSlot=slot;
      el('g-file-input').value='';
      el('g-file-input').click();
    };
    slot.ondragover=e=>{e.preventDefault();slot.classList.add('drag-over')};
    slot.ondragleave=()=>slot.classList.remove('drag-over');
    slot.ondrop=e=>{
      e.preventDefault();
      slot.classList.remove('drag-over');
      const f=e.dataTransfer.files[0];
      if(f&&f.type.startsWith('image/'))readAndSave(f,slot);
    };
  });
}

el('g-file-input').onchange=e=>{
  const f=e.target.files[0];
  if(f&&_pendingSlot)readAndSave(f,_pendingSlot);
  _pendingSlot=null;
};

function readAndSave(file,slot){
  const reader=new FileReader();
  reader.onload=ev=>saveSlotImage(slot,ev.target.result);
  reader.readAsDataURL(file);
}

function saveSlotImage(slot,dataUrl){
  const ls=activeLS();
  if(!ls)return;
  const type=slot.dataset.imgslot;
  if(type==='logo'){
    ls.logoImage=dataUrl;
    saveLogos();
  }else{
    const pi=+slot.dataset.pi;
    const ii=+slot.dataset.ii;
    ls.products[pi].images[ii]=dataUrl;
  }
  _imgsDirty=true;
  saveST();
  refreshPreview();
  /* update editor slots too */
  if(type==='ed-prod'){
    const pi=+slot.dataset.pi;
    const ii=+slot.dataset.ii;
    /* update editor slot in-place */
    let img=slot.querySelector('img');
    if(!img){img=document.createElement('img');slot.appendChild(img);}
    img.src=dataUrl;
    slot.classList.add('has-img');
  }
}

/* ─────────────────────────────────────────────────────────
   INPUT AUTOSAVE
───────────────────────────────────────────────────────── */
let _previewTimer=null;

document.addEventListener('input',e=>{
  const t=e.target;
  if(!t.dataset.lsid||!t.dataset.path)return;
  if(t.dataset.path==='currency')return; /* handled by change event */
  const ls=ST.lineSheets.find(x=>x.id===t.dataset.lsid);
  if(!ls)return;
  const isNumeric=t.type==='number'||t.inputMode==='decimal';
  const val=isNumeric?(parseFloat(t.value)||0):t.value;
  setPath(ls,t.dataset.path,val);

  clearTimeout(_previewTimer);
  _previewTimer=setTimeout(()=>{
    saveST();
    refreshPreview();
  },250);
});

document.addEventListener('change',e=>{
  const t=e.target;
  if(!t.dataset.lsid||!t.dataset.path)return;
  const ls=ST.lineSheets.find(x=>x.id===t.dataset.lsid);
  if(!ls)return;
  const isNumeric=t.type==='number'||t.inputMode==='decimal';
  const val=isNumeric?(parseFloat(t.value)||0):t.value;

  /* Currency change: offer to convert all stored prices */
  if(t.dataset.path==='currency'){
    const oldCur=ls.currency||'AUD';
    const newCur=val;
    setPath(ls,t.dataset.path,val);
    if(oldCur!==newCur){
      const defaultRate=oldCur==='AUD'&&newCur==='USD'?'0.72':
        oldCur==='USD'&&newCur==='AUD'?'1.389':'1';
      showCurrencyDialog(oldCur,newCur,defaultRate,rate=>{
        if(rate){
          for(const p of ls.products){
            for(const mv of p.metalVariants){
              mv.subtotalWholesale=Math.round(mv.subtotalWholesale*rate*100)/100;
              mv.subtotalRRP=Math.round(mv.subtotalRRP*rate*100)/100;
              for(const r of(mv.rows||[])){
                r.wholesale=Math.round(r.wholesale*rate*100)/100;
                r.rrp=Math.round(r.rrp*rate*100)/100;
              }
            }
          }
        }
        saveST();
        refreshPreview();
        const ef=el('ef');
        if(ef){ef.innerHTML=editorFieldsHTML(ls);bindSlots();}
      });
      return;
    }
    saveST();
    refreshPreview();
    const ef=el('ef');
    if(ef){ef.innerHTML=editorFieldsHTML(ls);bindSlots();}
    return;
  }

  setPath(ls,t.dataset.path,val);
  saveST();
  refreshPreview();
});

/* Save immediately when switching away (tab hidden, app switch, phone lock) */
document.addEventListener('visibilitychange',()=>{ if(document.visibilityState==='hidden') saveST(); });
window.addEventListener('beforeunload',()=>saveST());
window.addEventListener('pagehide',()=>saveST());

/* ─────────────────────────────────────────────────────────
   BUTTON ACTIONS (delegated)
───────────────────────────────────────────────────────── */
document.addEventListener('click',e=>{
  const btn=e.target.closest('[data-action]');
  if(!btn)return;
  const a=btn.dataset.action;
  const id=btn.dataset.id||btn.dataset.lsid;
  const pi=btn.dataset.pi!=null?+btn.dataset.pi:null;
  const mi=btn.dataset.mi!=null?+btn.dataset.mi:null;

  if(a==='newLS'){
    const ls=mkLineSheet();
    ST.lineSheets.push(ls);
    ST.activeId=ls.id;
    ST.view='editor';
    saveST();render();
  }
  else if(a==='edit'){
    ST.activeId=id;ST.view='editor';render();
  }
  else if(a==='back'){
    ST.view='dashboard';ST.activeId=null;render();
  }
  else if(a==='sortAZ'){
    const ls=activeLS();
    if(!ls)return;
    ls.products.sort((a,b)=>(a.pieceName||'').localeCompare(b.pieceName||''));
    saveST();
    const ef=el('ef');if(ef){ef.innerHTML=editorFieldsHTML(ls);bindSlots();}
    refreshPreview();
  }
  else if(a==='wooImages'){
    openWooModal();
  }
  else if(a==='dup'){
    const src=ST.lineSheets.find(x=>x.id===id);
    if(!src)return;
    const copy=deepClone(src);
    copy.id=uid();
    copy.buyerName=copy.buyerName?(copy.buyerName+' (copy)'):'Copy';
    // re-id nested
    for(const p of copy.products){
      p.id=uid();
      for(const mv of p.metalVariants){mv.id=uid();for(const r of mv.rows)r.id=uid();}
    }
    ST.lineSheets.push(copy);
    saveST();render();
  }
  else if(a==='del'){
    if(!confirm('Delete this line sheet? This cannot be undone.'))return;
    ST.lineSheets=ST.lineSheets.filter(x=>x.id!==id);
    saveST();render();
  }
  else if(a==='pdf'||a==='printPDF'){
    if(a==='pdf'){
      ST.activeId=id;ST.view='editor';
      saveST();render();
      setTimeout(()=>window.print(),400);
    }else{
      window.print();
    }
  }
  else if(a==='addProd'){
    const ls=ST.lineSheets.find(x=>x.id===id);
    if(!ls||ls.products.length>=3)return;
    ls.products.push(mkProduct());
    saveST();
    const ef=el('ef');if(ef){ef.innerHTML=editorFieldsHTML(ls);bindSlots();}
    refreshPreview();
  }
  else if(a==='removeProd'){
    const ls=ST.lineSheets.find(x=>x.id===id);
    if(!ls)return;
    ls.products.splice(pi,1);
    saveST();
    const ef=el('ef');if(ef){ef.innerHTML=editorFieldsHTML(ls);bindSlots();}
    refreshPreview();
  }
  else if(a==='moveUp'||a==='moveDown'){
    const ls=ST.lineSheets.find(x=>x.id===id);
    if(!ls)return;
    const to=a==='moveUp'?pi-1:pi+1;
    if(to<0||to>=ls.products.length)return;
    [ls.products[pi],ls.products[to]]=[ls.products[to],ls.products[pi]];
    saveST();
    const ef=el('ef');if(ef){ef.innerHTML=editorFieldsHTML(ls);bindSlots();}
    refreshPreview();
  }
  else if(a==='addMetal'){
    const ls=ST.lineSheets.find(x=>x.id===id);
    if(!ls)return;
    const p=ls.products[pi];
    if(!p||p.metalVariants.length>=3)return;
    p.metalVariants.push(mkVariant(''));
    saveST();
    const ef=el('ef');if(ef){ef.innerHTML=editorFieldsHTML(ls);bindSlots();}
    refreshPreview();
  }
  else if(a==='removeMetal'){
    const ls=ST.lineSheets.find(x=>x.id===id);
    if(!ls)return;
    ls.products[pi].metalVariants.splice(mi,1);
    saveST();
    const ef=el('ef');if(ef){ef.innerHTML=editorFieldsHTML(ls);bindSlots();}
    refreshPreview();
  }
  else if(a==='addRow'){
    const ls=ST.lineSheets.find(x=>x.id===id);
    if(!ls)return;
    ls.products[pi].metalVariants[mi].rows.push(mkRow(''));
    saveST();
    const ef=el('ef');if(ef){ef.innerHTML=editorFieldsHTML(ls);bindSlots();}
    refreshPreview();
  }
  else if(a==='removeRow'){
    const ls=ST.lineSheets.find(x=>x.id===id);
    if(!ls)return;
    const rows=ls.products[pi].metalVariants[mi].rows;
    if(rows.length<=1)return;  // keep at least one row
    rows.splice(+e.target.dataset.ri,1);
    recomputeSubtotals(ls);
    saveST();
    const ef=el('ef');if(ef){ef.innerHTML=editorFieldsHTML(ls);bindSlots();}
    refreshPreview();
  }
});

   IMPORT QUEUE  (written by the pricing app)
───────────────────────────────────────────────────────── */
function processImportQueue(){
  /* Read from URL param — works across PWA/Safari localStorage isolation */
  let item;
  try{
    const param=new URLSearchParams(window.location.search).get('import');
    if(!param)return;
    item=JSON.parse(decodeURIComponent(param));
    /* Strip the param from the URL without reloading */
    history.replaceState({},'',window.location.pathname);
  }catch(e){
    console.error('processImportQueue error:',e);
    alert('Import failed: '+e);
    return;
  }

  const currency=item.currency||'AUD';
  const p=item.product||item;
  p.id=p.id||uid();
  p.images=p.images||[null,null];
  for(const mv of(p.metalVariants||[])){
    mv.id=mv.id||uid();
    for(const r of(mv.rows||[]))r.id=r.id||uid();
  }

  const ls=mkLineSheet();
  ls.currency=currency;
  ls.products=[p];
  ST.lineSheets.push(ls);

  ST.activeId=ls.id;
  ST.view='editor';
  saveST();
  /* After render, scroll preview to product page so it's immediately visible */
  setTimeout(function(){
    const pages=document.querySelectorAll('#doc-preview .doc-page');
    if(pages.length>1)pages[1].scrollIntoView({behavior:'smooth',block:'start'});
  },100);
}

/* ─────────────────────────────────────────────────────────
   BATCH IMPORT  (from Products tab via localStorage bridge)
───────────────────────────────────────────────────────── */
function processQueueImport(){
  let item;
  try{
    const raw=localStorage.getItem('bs_ls_queue');
    if(!raw)return;
    item=JSON.parse(raw);
    localStorage.removeItem('bs_ls_queue');
  }catch(e){
    console.error('processQueueImport error:',e);
    return;
  }

  const currency=item.currency||'AUD';
  const incoming=(item.products||[]).map(p=>{
    p.id=p.id||uid();
    p.images=p.images||[null,null];
    for(const mv of(p.metalVariants||[])){
      mv.id=mv.id||uid();
      for(const r of(mv.rows||[]))r.id=r.id||uid();
    }
    return p;
  });
  if(!incoming.length)return;

  if(item.action==='add'&&item.lsId){
    /* Append to existing line sheet */
    const ls=ST.lineSheets.find(x=>x.id===item.lsId);
    if(ls){
      ls.products.push(...incoming);
      ST.activeId=ls.id;
      ST.view='editor';
      saveST();
      return;
    }
  }

  /* Create new line sheet */
  const ls=mkLineSheet();
  ls.currency=currency;
  ls.products=incoming;
  ST.lineSheets.push(ls);
  ST.activeId=ls.id;
  ST.view='editor';
  saveST();
}

async function runWooImport(){
  const url=(document.getElementById('woo-url')||{}).value||'';
  const key=(document.getElementById('woo-key')||{}).value||'';
  const secret=(document.getElementById('woo-secret')||{}).value||'';
  const statusEl=document.getElementById('woo-status');
  const btn=document.getElementById('woo-fetch-btn');
  if(!url||!key||!secret){statusEl.textContent='Please fill in all fields.';return;}

  localStorage.setItem('bs_woo_creds',JSON.stringify({url,key,secret}));

  const ls=activeLS();
  if(!ls){statusEl.textContent='No active line sheet.';return;}

  btn.textContent='Fetching products…';btn.disabled=true;statusEl.textContent='';

  try{
    let allProducts=[];
    for(let page=1;page<=3;page++){
      const res=await fetch('/api/woo',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({siteUrl:url,key,secret,page})});
      const data=await res.json();
      if(data.error)throw new Error(data.error);
      allProducts=allProducts.concat(data.items||[]);
      if(page>=data.totalPages)break;
    }

    // Metal code aliases: maps bracket suffix to keywords found in variation labels/SKUs
    const METAL_ALIASES={
      'STG':['stg','sterling','silver'],
      '9YG':['9yg','9ct','9k','9ctyellow','9ktyellow','yellowgold9'],
      '9WG':['9wg','9ctwhite','9kwhite'],
      '18YG':['18yg','18ct','18k','18ctyellow','18ktyellow','yellowgold18'],
      '18WG':['18wg','18ctwhite','18kwhite'],
      'PLT':['plt','platinum','plat'],
    };

    const normalize=s=>(s||'').toLowerCase().replace(/[^a-z0-9]/g,'');

    // Extract metal code from "(STG)" / "(9YG)" suffix in product name
    function extractMetal(name){
      const m=(name||'').match(/\(([^)]+)\)\s*$/);
      return m?m[1].toUpperCase().trim():null;
    }
    function stripMetal(name){
      return(name||'').replace(/\s*\([^)]+\)\s*$/,'').trim();
    }

    // Find best matching variation for a metal code
    function bestVariation(woo,metalCode){
      if(!metalCode||!woo.variations||!woo.variations.length)return null;
      const aliases=(METAL_ALIASES[metalCode]||[normalize(metalCode)]);
      return woo.variations.find(v=>{
        const lbl=normalize(v.label);
        const sku=normalize(v.sku||'');
        return aliases.some(a=>lbl.includes(a)||sku.includes(a));
      })||null;
    }

    const matchMap={};   // lspId → woo product id
    const varMap={};     // lspId → { slot0: "var:id:0", slot1: "" }

    for(const lsp of ls.products){
      const metal=extractMetal(lsp.pieceName);
      const baseName=metal?stripMetal(lsp.pieceName):lsp.pieceName;
      const normBase=normalize(baseName);

      // Try exact match first, then base-name match
      let woo=allProducts.find(w=>normalize(w.name)===normalize(lsp.pieceName));
      if(!woo)woo=allProducts.find(w=>normalize(w.name)===normBase);

      if(!woo){matchMap[lsp.id]='';continue;}
      matchMap[lsp.id]=woo.id;

      // If we have a metal code, pre-select the matching variation
      if(metal&&woo.variations&&woo.variations.length){
        const bestVar=bestVariation(woo,metal);
        if(bestVar){
          varMap[lsp.id]={slot0:`var:${bestVar.id}:0`,slot1:bestVar.images&&bestVar.images[1]?`var:${bestVar.id}:1`:''};
        }
      }
    }

    // Show manual match UI
    document.getElementById('woo-modal-overlay').remove();
    showWooMatchUI(ls,allProducts,matchMap,varMap,{url,key,secret});
  }catch(e){
    statusEl.style.color='#c00';
    statusEl.textContent='Error: '+e.message;
    btn.textContent='Fetch & Match Images';btn.disabled=false;
  }
}

function imageSourceOptions(woo){
  /* Returns option elements for every available image source on a woo product */
  const opts=[];
  if(woo.images&&woo.images.length){
    opts.push(`<option value="main:0">Main photo</option>`);
    if(woo.images[1])opts.push(`<option value="main:1">Main photo 2</option>`);
  }
  for(const v of(woo.variations||[])){
    if(v.images&&v.images.length){
      opts.push(`<option value="var:${v.id}:0">${esc(v.label)}</option>`);
      if(v.images[1])opts.push(`<option value="var:${v.id}:1">${esc(v.label)} (2)</option>`);
    }
  }
  return opts.join('');
}

function updateVariationSlots(lspId,wooProducts){
  const prodSel=document.querySelector(`select[data-role="woo-product"][data-lspid="${lspId}"]`);
  const slotsDiv=document.getElementById('var-slots-'+lspId);
  const slot0=document.querySelector(`select[data-role="slot0"][data-lspid="${lspId}"]`);
  const slot1=document.querySelector(`select[data-role="slot1"][data-lspid="${lspId}"]`);
  if(!prodSel||!slotsDiv)return;
  const wooId=parseInt(prodSel.value);
  const woo=wooProducts.find(w=>w.id===wooId);
  if(!woo){slotsDiv.style.display='none';return;}
  const opts=imageSourceOptions(woo);
  if(!opts){slotsDiv.style.display='none';return;}
  slot0.innerHTML='<option value="">Slot 1 — skip</option>'+opts;
  slot1.innerHTML='<option value="">Slot 2 — skip</option>'+opts;
  // Auto-select sensible defaults
  if(slot0.options.length>1)slot0.selectedIndex=1;
  if(slot0.options.length>2)slot1.selectedIndex=2;
  slotsDiv.style.display='grid';
}

async function resolveImageUrl(woo,slotVal){
  /* slotVal: "main:0", "main:1", "var:{id}:0", "var:{id}:1" */
  if(!slotVal)return null;
  const parts=slotVal.split(':');
  if(parts[0]==='main'){
    return woo.images[parseInt(parts[1])]||null;
  }else{
    const varId=parseInt(parts[1]);
    const idx=parseInt(parts[2]);
    const variation=(woo.variations||[]).find(v=>v.id===varId);
    return variation?variation.images[idx]||null:null;
  }
}

async function applyWooImages(ls,wooProducts){
  const btn=document.getElementById('woo-apply-btn');
  const statusEl=document.getElementById('woo-apply-status');
  btn.disabled=true;
  let matched=0,skipped=0;

  for(const lsp of ls.products){
    const prodSel=document.querySelector(`select[data-role="woo-product"][data-lspid="${lsp.id}"]`);
    if(!prodSel||!prodSel.value){skipped++;continue;}
    const woo=wooProducts.find(w=>w.id==prodSel.value);
    if(!woo){skipped++;continue;}

    const slot0Sel=document.querySelector(`select[data-role="slot0"][data-lspid="${lsp.id}"]`);
    const slot1Sel=document.querySelector(`select[data-role="slot1"][data-lspid="${lsp.id}"]`);
    const slotVals=[slot0Sel?slot0Sel.value:'main:0', slot1Sel?slot1Sel.value:''];

    // If no variation slots shown, fall back to main images
    const slotsDiv=document.getElementById('var-slots-'+lsp.id);
    const useSlots=slotsDiv&&slotsDiv.style.display!=='none';

    btn.textContent=`Downloading… (${matched+1})`;
    for(let ii=0;ii<2;ii++){
      try{
        const imgUrl=useSlots
          ? await resolveImageUrl(woo,slotVals[ii])
          : (woo.images[ii]||null);
        if(!imgUrl)continue;
        const r=await fetch('/api/woo-img',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({url:imgUrl})});
        const d=await r.json();
        if(d.dataUrl){lsp.images[ii]=d.dataUrl;_imgsDirty=true;}
      }catch(e){}
    }
    matched++;
  }

  saveST();
  const ef=el('ef');if(ef){ef.innerHTML=editorFieldsHTML(ls);bindSlots();}
  refreshPreview();
  statusEl.style.color='#2a7a2a';
  statusEl.textContent=`Done — ${matched} products updated.`;
  btn.textContent='Download & Apply Images';btn.disabled=false;
}

  <div id="gwoo-status" style="min-height:18px;margin-bottom:12px;font-size:12px;color:#888"></div>
  <div style="display:flex;gap:10px">
    <button id="gwoo-run-btn" style="flex:1;background:#000;color:#fff;border:none;padding:10px;font-size:13px;cursor:pointer;font-weight:600">Sync All Sheets</button>
    <button onclick="document.getElementById('woo-global-overlay').remove()" style="padding:10px 16px;border:1px solid #ddd;background:#fff;cursor:pointer;font-size:13px">Cancel</button>
  </div>
</div>`;
  document.body.appendChild(overlay);
  document.getElementById('gwoo-run-btn').onclick=runGlobalWooSync;
}

async function runGlobalWooSync(){
  const url=(document.getElementById('gwoo-url')||{}).value||'';
  const key=(document.getElementById('gwoo-key')||{}).value||'';
  const secret=(document.getElementById('gwoo-secret')||{}).value||'';
  const statusEl=document.getElementById('gwoo-status');
  const btn=document.getElementById('gwoo-run-btn');
  if(!url||!key||!secret){statusEl.textContent='Fill in all fields.';return;}
  localStorage.setItem('bs_woo_creds',JSON.stringify({url,key,secret}));
  btn.disabled=true;btn.textContent='Fetching products…';

  try{
    // Fetch all WooCommerce products
    let wooAll=[];
    for(let page=1;page<=3;page++){
      const res=await fetch('/api/woo',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({siteUrl:url,key,secret,page})});
      const data=await res.json();
      if(data.error)throw new Error(data.error);
      wooAll=wooAll.concat(data.items||[]);
      if(page>=data.totalPages)break;
    }
    statusEl.textContent=`${wooAll.length} WooCommerce products loaded. Matching across all sheets…`;

    const normalize=s=>(s||'').toLowerCase().replace(/[^a-z0-9]/g,'');
    function extractMetal(name){const m=(name||'').match(/\(([^)]+)\)\s*$/);return m?m[1].toUpperCase().trim():null;}
    function stripMetal(name){return(name||'').replace(/\s*\([^)]+\)\s*$/,'').trim();}
    const METAL_ALIASES={STG:['stg','sterling','silver'],'9YG':['9yg','9ct','9k'],'18YG':['18yg','18ct','18k'],PLT:['plt','platinum','plat']};
    function bestVar(woo,metalCode){
      const aliases=(METAL_ALIASES[metalCode]||[normalize(metalCode)]);
      return(woo.variations||[]).find(v=>aliases.some(a=>normalize(v.label).includes(a)||normalize(v.sku||'').includes(a)))||null;
    }

    let totalMatched=0;
    for(const ls of ST.lineSheets){
      for(const lsp of ls.products){
        if(lsp.images&&(lsp.images[0]||lsp.images[1]))continue; // skip already has images
        const metal=extractMetal(lsp.pieceName);
        const baseName=metal?stripMetal(lsp.pieceName):lsp.pieceName;
        let woo=wooAll.find(w=>normalize(w.name)===normalize(lsp.pieceName));
        if(!woo)woo=wooAll.find(w=>normalize(w.name)===normalize(baseName));
        if(!woo)continue;

        const imgUrls=[];
        if(metal&&woo.variations&&woo.variations.length){
          const bv=bestVar(woo,metal);
          if(bv&&bv.images&&bv.images[0]){imgUrls.push(bv.images[0]);if(bv.images[1])imgUrls.push(bv.images[1]);}
        }
        if(!imgUrls.length&&woo.images&&woo.images[0]){imgUrls.push(woo.images[0]);if(woo.images[1])imgUrls.push(woo.images[1]);}
        if(!imgUrls.length)continue;

        btn.textContent=`Downloading… (${totalMatched+1})`;
        for(let ii=0;ii<imgUrls.length&&ii<2;ii++){
          try{
            const r=await fetch('/api/woo-img',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({url:imgUrls[ii]})});
            const d=await r.json();
            if(d.dataUrl){lsp.images[ii]=d.dataUrl;_imgsDirty=true;}
          }catch(e){}
        }
        totalMatched++;
      }
    }
    saveST();
    statusEl.style.color='#2a7a2a';
    statusEl.textContent=`Done — ${totalMatched} products updated across all sheets.`;
    btn.textContent='Sync All Sheets';btn.disabled=false;
  }catch(e){
    statusEl.style.color='#c00';statusEl.textContent='Error: '+e.message;
    btn.textContent='Sync All Sheets';btn.disabled=false;
  }
}

/* ─────────────────────────────────────────────────────────
   CURRENCY DIALOG
───────────────────────────────────────────────────────── */
function applyLogoToAll(file){
  if(!file)return;
  const reader=new FileReader();
  reader.onload=ev=>{
    const img=new Image();
    img.onload=()=>{
      /* Resize to max 400px and compress to keep well under localStorage quota */
      const MAX=400;
      const scale=Math.min(1,MAX/Math.max(img.width,img.height));
      const w=Math.round(img.width*scale);
      const h=Math.round(img.height*scale);
      const canvas=document.createElement('canvas');
      canvas.width=w;canvas.height=h;
      canvas.getContext('2d').drawImage(img,0,0,w,h);
      const dataUrl=canvas.toDataURL('image/webp',0.85);
      try{
        localStorage.setItem('bs_ls_logo',dataUrl);
      }catch(e){
        alert('Logo file is still too large. Please use a smaller image.');
        return;
      }
      for(const ls of ST.lineSheets){ls.logoImage=dataUrl;}
      saveST();
      render();
      alert('Logo applied to all '+ST.lineSheets.length+' sheets.');
    };
    img.src=ev.target.result;
  };
  reader.readAsDataURL(file);
}

function showCurrencyDialog(oldCur,newCur,defaultRate,callback){
  const ov=document.createElement('div');
  ov.style.cssText='position:fixed;inset:0;background:rgba(0,0,0,0.4);z-index:9999;display:flex;align-items:center;justify-content:center;padding:20px';
  ov.innerHTML=`
<div style="background:#fff;padding:28px;max-width:380px;width:100%;font-family:inherit;font-size:13px">
  <div style="font-size:15px;font-weight:600;margin-bottom:12px">Convert prices ${oldCur} → ${newCur}?</div>
  <div style="color:#888;font-size:12px;margin-bottom:16px">Enter exchange rate to convert all prices, or skip to just change the label.</div>
  <input id="cur-rate-input" type="number" step="0.001" value="${defaultRate}"
    style="width:100%;border:1px solid #ddd;padding:10px;font-size:15px;box-sizing:border-box;margin-bottom:16px">
  <div style="display:flex;gap:10px">
    <button id="cur-convert-btn" style="flex:1;background:#000;color:#fff;border:none;padding:10px;font-size:13px;font-weight:600;cursor:pointer">Convert prices</button>
    <button id="cur-skip-btn" style="padding:10px 16px;border:1px solid #ddd;background:#fff;cursor:pointer;font-size:13px">Label only</button>
  </div>
</div>`;
  document.body.appendChild(ov);
  const inp=ov.querySelector('#cur-rate-input');
  inp.select();
  ov.querySelector('#cur-convert-btn').onclick=()=>{
    const r=parseFloat(inp.value);
    ov.remove();
    callback(isNaN(r)||r<=0?null:r);
  };
  ov.querySelector('#cur-skip-btn').onclick=()=>{ov.remove();callback(null);};
}

/* ─────────────────────────────────────────────────────────
   INIT
───────────────────────────────────────────────────────── */
async function initApp(){
  loadST();
  /* Migration: if old localStorage data has base64 images embedded,
     save them to IndexedDB first, then strip from localStorage */
  /* Only check product images — logo is now stored in localStorage via loadLogos()
     and must NOT trigger the migration path or it will wipe IDB product images */
  const hasOldImages=ST.lineSheets.some(ls=>
    (ls.products||[]).some(p=>p.images&&(p.images[0]||p.images[1]))
  );
  if(hasOldImages){
    _imgsDirty=true;
    await saveImagesToIDB();
    saveST(); /* strip images from localStorage */
  }
  /* Always reload images from IDB — ensures display is correct
     whether we just migrated or are loading from a previous session */
  await loadAllImages();
  processQueueImport();
  processImportQueue();
  render();
}
initApp();
</script>
