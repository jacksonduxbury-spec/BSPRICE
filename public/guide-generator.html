<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Wholesale Line Sheet Builder — Guide Generator</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:ital,wght@0,300;0,400;0,500;1,300&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;1,9..40,400&family=DM+Serif+Display:ital@0;1&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #fafaf8;
      color: #0a0a0a;
      font-family: 'DM Sans', sans-serif;
      font-size: 16px;
      line-height: 1.6;
      min-height: 100vh;
      padding: 64px 24px 120px;
    }

    #app { max-width: 760px; margin: 0 auto; }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(8px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .fade-in { animation: fadeIn 0.4s ease forwards; }

    .label {
      font-family: 'DM Mono', monospace;
      font-size: 11px;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      color: #666;
    }

    h1.title {
      font-family: 'DM Serif Display', serif;
      font-size: clamp(32px, 5vw, 48px);
      font-weight: 400;
      line-height: 1.1;
      margin-top: 12px;
      letter-spacing: -0.01em;
    }

    .descriptor {
      font-size: 15px;
      color: #666;
      margin-top: 14px;
      max-width: 520px;
      line-height: 1.65;
    }

    hr.rule       { border: none; border-top: 0.5px solid #0a0a0a; margin: 32px 0; }
    hr.rule-light { border: none; border-top: 0.5px solid #ddd; margin: 28px 0; }

    .api-key-row {
      display: flex;
      gap: 10px;
      align-items: center;
      margin-bottom: 24px;
    }

    .api-key-label {
      font-family: 'DM Mono', monospace;
      font-size: 10px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: #666;
      white-space: nowrap;
    }

    .api-key-input {
      flex: 1;
      font-family: 'DM Mono', monospace;
      font-size: 12px;
      border: 0.5px solid #0a0a0a;
      background: #fafaf8;
      padding: 8px 12px;
      outline: none;
      color: #0a0a0a;
    }
    .api-key-input:focus {
      outline: 2px solid #0a0a0a;
      outline-offset: -2px;
    }

    .btn {
      font-family: 'DM Mono', monospace;
      font-size: 11px;
      font-weight: 500;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      border: none;
      padding: 13px 28px;
      cursor: pointer;
      transition: opacity 0.15s;
    }
    .btn:disabled { opacity: 0.4; cursor: not-allowed; }
    .btn-solid { background: #0a0a0a; color: #fafaf8; }
    .btn-solid:not(:disabled):hover { opacity: 0.75; }
    .btn-outline { background: transparent; color: #0a0a0a; border: 0.5px solid #0a0a0a; }
    .btn-outline:not(:disabled):hover { background: #0a0a0a; color: #fafaf8; }

    .loading-msg { font-size: 14px; font-style: italic; color: #666; margin-top: 20px; }
    .error-msg { font-family: 'DM Mono', monospace; font-size: 12px; color: #c00; margin-top: 16px; }

    .output-card {
      border: 0.5px solid #0a0a0a;
      background: #fff;
      padding: 40px 44px;
      margin-top: 32px;
    }

    /* Markdown */
    .md h1 {
      font-family: 'DM Serif Display', serif;
      font-size: 28px;
      font-weight: 400;
      line-height: 1.2;
      margin: 36px 0 14px;
      letter-spacing: -0.01em;
    }
    .md h1:first-child { margin-top: 0; }
    .md h2 {
      font-family: 'DM Serif Display', serif;
      font-size: 21px;
      font-weight: 400;
      line-height: 1.25;
      margin: 32px 0 10px;
    }
    .md h3 {
      font-family: 'DM Sans', sans-serif;
      font-size: 13px;
      font-weight: 500;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      margin: 24px 0 8px;
    }
    .md p  { font-size: 15px; line-height: 1.72; margin-bottom: 14px; }
    .md ul, .md ol { padding-left: 22px; margin-bottom: 14px; }
    .md li { font-size: 15px; line-height: 1.7; margin-bottom: 4px; }
    .md strong { font-weight: 600; }
    .md code {
      font-family: 'DM Mono', monospace;
      font-size: 12px;
      background: #f0f0ee;
      padding: 1px 5px;
    }
    .md pre {
      background: #f0f0ee;
      border-left: 2px solid #0a0a0a;
      padding: 16px 18px;
      margin: 18px 0;
      overflow-x: auto;
    }
    .md pre code { background: none; padding: 0; font-size: 12px; line-height: 1.65; }
    .md hr { border: none; border-top: 0.5px solid #0a0a0a; margin: 28px 0; }

    .action-row { display: flex; gap: 12px; align-items: center; margin-top: 24px; flex-wrap: wrap; }
    .share-note {
      font-family: 'DM Mono', monospace;
      font-size: 10px;
      letter-spacing: 0.08em;
      color: #666;
      margin-top: 14px;
      line-height: 1.6;
    }
  </style>
</head>
<body>
<div id="app"></div>

<script type="module">
  import { h, render } from 'https://esm.sh/preact@10';
  import { useState, useCallback } from 'https://esm.sh/preact@10/hooks';
  import htm from 'https://esm.sh/htm@3';
  const html = htm.bind(h);

  const PROMPT = `You are a senior product engineer writing a high-level technical guide for another Claude instance. Write a clear, thorough overview of how to build a "Wholesale Line Sheet Builder" web application -- a tool used by a product brand to create buyer-ready PDF documents for wholesale accounts. Cover: (1) what the app does and its core workflow, (2) why it is built as a static single-page HTML/JS app with localStorage on Netlify with no backend, (3) two distinct modes -- editor interface vs document/print view, (4) editor features including a dashboard, form-based editor, up to 3 products per document, per-product image slots and metal/variant rows, per-variant wholesale and RRP pricing columns, composite product display, and a live preview panel, (5) document/print view including cover page, per-product pages, strict typographic constraints (single font, black/white only, hairline rules, no decoration), and PDF export via window.print(), (6) data model in localStorage as JSON, (7) optional CSV import for pricing, (8) key technical considerations including print CSS media queries, FileReader API for images, and currency toggle, (9) limitations and future iteration paths, (10) recommended build order. Write as structured markdown. Be specific and technical but accessible. Do not reference any specific brand names or personal data.`;

  // ── Markdown renderer ──────────────────────────────────────────────────────
  function renderInline(text) {
    const parts = [];
    const regex = /(\*\*[^*]+\*\*|`[^`]+`)/g;
    let last = 0, m, idx = 0;
    while ((m = regex.exec(text)) !== null) {
      if (m.index > last) parts.push(text.slice(last, m.index));
      const t = m[0];
      if (t.startsWith('**')) parts.push(h('strong', { key: idx++ }, t.slice(2, -2)));
      else parts.push(h('code', { key: idx++ }, t.slice(1, -1)));
      last = regex.lastIndex;
    }
    if (last < text.length) parts.push(text.slice(last));
    return parts;
  }

  function MarkdownRenderer({ text }) {
    const lines = text.split('\n');
    const elements = [];
    let i = 0, k = 0;

    while (i < lines.length) {
      const line = lines[i];

      if (line.startsWith('```')) {
        let code = '';
        i++;
        while (i < lines.length && !lines[i].startsWith('```')) { code += lines[i] + '\n'; i++; }
        elements.push(h('pre', { key: k++ }, h('code', null, code.trimEnd())));
        i++; continue;
      }
      if (line.startsWith('### ')) { elements.push(h('h3', { key: k++ }, renderInline(line.slice(4)))); i++; continue; }
      if (line.startsWith('## '))  { elements.push(h('h2', { key: k++ }, renderInline(line.slice(3)))); i++; continue; }
      if (line.startsWith('# '))   { elements.push(h('h1', { key: k++ }, renderInline(line.slice(2)))); i++; continue; }
      if (/^[-*]{3,}$/.test(line.trim())) { elements.push(h('hr', { key: k++ })); i++; continue; }

      if (/^[-*] /.test(line)) {
        const items = [];
        while (i < lines.length && /^[-*] /.test(lines[i])) {
          items.push(h('li', { key: i }, renderInline(lines[i].slice(2))));
          i++;
        }
        elements.push(h('ul', { key: k++ }, items)); continue;
      }

      if (/^\d+\. /.test(line)) {
        const items = [];
        while (i < lines.length && /^\d+\. /.test(lines[i])) {
          items.push(h('li', { key: i }, renderInline(lines[i].replace(/^\d+\. /, ''))));
          i++;
        }
        elements.push(h('ol', { key: k++ }, items)); continue;
      }

      if (line.trim() === '') { i++; continue; }
      elements.push(h('p', { key: k++ }, renderInline(line)));
      i++;
    }

    return h('div', { class: 'md' }, elements);
  }

  // ── App ────────────────────────────────────────────────────────────────────
  function App() {
    const [apiKey, setApiKey] = useState(() => localStorage.getItem('anthropic_api_key') || '');
    const [output,  setOutput]  = useState('');
    const [loading, setLoading] = useState(false);
    const [done,    setDone]    = useState(false);
    const [copied,  setCopied]  = useState(false);
    const [error,   setError]   = useState('');

    const saveKey = (val) => {
      setApiKey(val);
      localStorage.setItem('anthropic_api_key', val);
    };

    const generate = useCallback(async () => {
      if (!apiKey.trim()) { setError('Please enter your Anthropic API key above.'); return; }
      setError(''); setLoading(true); setDone(false); setOutput('');

      try {
        const res = await fetch('https://api.anthropic.com/v1/messages', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
            'x-api-key': apiKey.trim(),
            'anthropic-version': '2023-06-01',
            'anthropic-dangerous-direct-browser-access': 'true',
          },
          body: JSON.stringify({
            model: 'claude-sonnet-4-20250514',
            max_tokens: 1000,
            messages: [{ role: 'user', content: PROMPT }],
          }),
        });

        if (!res.ok) {
          const err = await res.json().catch(() => ({}));
          throw new Error(err?.error?.message || `API error ${res.status}`);
        }

        const data = await res.json();
        setOutput(data?.content?.[0]?.text || '');
        setDone(true);
      } catch (e) {
        setError(e.message || 'Something went wrong. Check your API key and try again.');
      } finally {
        setLoading(false);
      }
    }, [apiKey]);

    const copy = useCallback(() => {
      navigator.clipboard.writeText(output).then(() => {
        setCopied(true);
        setTimeout(() => setCopied(false), 2000);
      });
    }, [output]);

    return html`
      <span class="label">Build Guide Generator</span>
      <h1 class="title">Wholesale Line Sheet<br/>Builder</h1>
      <p class="descriptor">
        Click generate to produce a technical overview of this application —
        suitable for handing to another Claude instance to continue development.
      </p>

      <hr class="rule" />

      <div class="api-key-row">
        <span class="api-key-label">API Key</span>
        <input
          class="api-key-input"
          type="password"
          placeholder="sk-ant-..."
          value=${apiKey}
          onInput=${e => saveKey(e.target.value)}
          spellcheck="false"
        />
      </div>

      <button class="btn btn-solid" onClick=${generate} disabled=${loading}>
        ${loading ? 'Generating…' : 'Generate Guide'}
      </button>

      ${loading && html`<p class="loading-msg">Calling Claude — this takes a moment…</p>`}
      ${error   && html`<p class="error-msg">${error}</p>`}

      ${done && output && html`
        <div class="fade-in">
          <div class="output-card">
            <${MarkdownRenderer} text=${output} />
          </div>
          <div class="action-row">
            <button class="btn btn-outline" onClick=${copy}>
              ${copied ? 'Copied ✓' : 'Copy to Clipboard'}
            </button>
            <button class="btn btn-solid" onClick=${generate} disabled=${loading}>
              Regenerate
            </button>
          </div>
          <p class="share-note">
            To share: copy the text above and paste it at the start of a new Claude conversation,<br/>
            or share your GitHub repo URL alongside the output.
          </p>
        </div>
      `}
    `;
  }

  render(h(App, null), document.getElementById('app'));
</script>
</body>
</html>
